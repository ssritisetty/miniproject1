spring.datasource.url=jdbc:h2:mem:serviceconnect;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
serviceconnect.app.jwtSecret=serviceConnectSecretKeyMustBeLongEnoughForHS512AlgorithmThisIsATestKey
serviceconnect.app.jwtExpirationMs=86400000
server.port=${PORT:1236}